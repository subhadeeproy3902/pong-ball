<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    background:#181715; color:#faf9f5; position:relative;
    font-family:'Inter',sans-serif;
  }
  .glow{position:absolute;top:-180px;right:-140px;width:620px;height:620px;border-radius:50%;
    background:radial-gradient(circle,rgba(204,120,92,.20),transparent 62%);}
  .frame{position:absolute;inset:28px;border:1px solid #2f2d28;border-radius:18px;}
  .pad{position:absolute;inset:28px;padding:62px 70px;display:flex;flex-direction:column;justify-content:space-between;}
  .top{display:flex;align-items:center;gap:18px;}
  .top img{width:60px;height:60px;border-radius:14px;}
  .wordmark{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:500;letter-spacing:-.01em;color:#ece6da;}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:15px;letter-spacing:.22em;text-transform:uppercase;color:#cc785c;margin-bottom:20px;}
  h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:88px;line-height:.98;letter-spacing:-.02em;}
  h1 em{font-style:italic;color:#cc785c;}
  .sub{color:#a09d96;font-size:23px;margin-top:24px;max-width:30ch;line-height:1.5;}
  .bottom{display:flex;align-items:center;justify-content:space-between;}
  .cmd{font-family:'JetBrains Mono',monospace;font-size:19px;color:#ece6da;background:#211f1c;border:1px solid #34322d;border-radius:10px;padding:14px 18px;}
  .cmd .p{color:#cc785c;}
  .domain{font-family:'JetBrains Mono',monospace;font-size:17px;color:#6c6a64;letter-spacing:.02em;}
</style></head>
<body>
  <div class="glow"></div>
  <div class="frame"></div>
  <div class="pad">
    <div class="top"><img src="../assets/logo.svg"><span class="wordmark">pong-ball</span></div>
    <div>
      <div class="eyebrow">A terminal paddle game</div>
      <h1>Quiet, fast,<br>and honest <em>Pong.</em></h1>
      <div class="sub">Sub-stepped physics, a spring-driven paddle, five themes, four modes — one binary.</div>
    </div>
    <div class="bottom">
      <div class="cmd"><span class="p">$</span> brew install pong-ball</div>
      <div class="domain">pongball.mvp-subha.me</div>
    </div>
  </div>
</body></html>
