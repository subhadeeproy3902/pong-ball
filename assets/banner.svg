<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="pong-ball — a minimalist physics-based paddle game for the terminal">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d1b19"/>
      <stop offset="1" stop-color="#151311"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#cc785c" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#cc785c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ballGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#cc785c" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#cc785c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#232220"/><stop offset="1" stop-color="#191816"/>
    </linearGradient>
    <style>
      .mono{font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace}
      .sans{font-family:'Inter',-apple-system,'Segoe UI',Roboto,sans-serif}
    </style>
  </defs>

  <!-- card -->
  <rect x="0.5" y="0.5" width="1279" height="319" rx="20" fill="url(#bg)" stroke="#2f2d28"/>
  <ellipse cx="1050" cy="80" rx="420" ry="320" fill="url(#glow)"/>

  <!-- ── left: logo lockup + copy ── -->
  <!-- logo mark -->
  <g transform="translate(72,56)">
    <rect x="0" y="0" width="60" height="60" rx="14" fill="url(#tile)" stroke="#3a3833"/>
    <path d="M14 19 L27 38 Q30 42 33 38 L46 15" fill="none" stroke="#cc785c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="42" cy="20" r="3.4" fill="#faf9f5"/>
    <rect x="21" y="42" width="19" height="4.6" rx="2.3" fill="#cc785c"/>
  </g>
  <text x="150" y="95" class="mono" font-size="34" font-weight="500" letter-spacing="-0.5" fill="#ece6da">pong-ball</text>

  <text x="74" y="168" class="sans" font-size="22" fill="#a09d96">A minimalist, physics-based paddle game</text>
  <text x="74" y="200" class="sans" font-size="22" fill="#a09d96">for your terminal.</text>

  <!-- pills -->
  <g class="mono" font-size="13" fill="#cbb9ad">
    <g>
      <rect x="74" y="226" width="158" height="30" rx="15" fill="#211f1c" stroke="#34322d"/>
      <text x="90" y="246" fill="#a09d96">sub-stepped physics</text>
    </g>
    <g>
      <rect x="242" y="226" width="124" height="30" rx="15" fill="#211f1c" stroke="#34322d"/>
      <text x="258" y="246" fill="#a09d96">spring paddle</text>
    </g>
    <g>
      <rect x="376" y="226" width="98" height="30" rx="15" fill="#211f1c" stroke="#34322d"/>
      <text x="392" y="246" fill="#a09d96">5 themes</text>
    </g>
    <g>
      <rect x="484" y="226" width="92" height="30" rx="15" fill="#211f1c" stroke="#34322d"/>
      <text x="500" y="246" fill="#a09d96">4 modes</text>
    </g>
  </g>

  <text x="74" y="290" class="mono" font-size="15"><tspan fill="#cc785c">$</tspan><tspan fill="#ece6da" dx="8">brew install pong-ball</tspan></text>

  <!-- ── right: mini play field ── -->
  <g transform="translate(792,52)">
    <rect x="0" y="0" width="416" height="216" rx="14" fill="#141312" stroke="#2c2a26"/>
    <!-- title dots -->
    <circle cx="22" cy="22" r="5" fill="#cc785c"/>
    <circle cx="40" cy="22" r="5" fill="#34322d"/>
    <circle cx="58" cy="22" r="5" fill="#34322d"/>
    <text x="80" y="27" class="mono" font-size="12" fill="#6c6a64">pong-ball — play</text>
    <!-- HUD -->
    <text x="22" y="62" class="mono" font-size="12" fill="#a09d96">SCORE <tspan fill="#cc785c" font-weight="700">128</tspan></text>
    <text x="330" y="62" class="mono" font-size="12" fill="#5db8a6">×17</text>
    <!-- play frame -->
    <rect x="22" y="74" width="372" height="118" rx="8" fill="none" stroke="#3a3833" stroke-dasharray="2 4"/>
    <!-- trajectory -->
    <path d="M70 168 L150 110 Q160 103 170 110 L300 96" fill="none" stroke="#915541" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <circle cx="270" cy="98" r="2" fill="#915541" opacity="0.5"/>
    <circle cx="240" cy="100" r="1.8" fill="#915541" opacity="0.32"/>
    <!-- paddle + ball -->
    <rect x="138" y="172" width="44" height="6" rx="3" fill="#cc785c"/>
    <circle cx="300" cy="96" r="11" fill="url(#ballGlow)"/>
    <circle cx="300" cy="96" r="4.4" fill="#faf9f5"/>
  </g>
</svg>
