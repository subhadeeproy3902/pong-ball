project_name: paddle-ball

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: paddle-ball
    main: .
    binary: paddle-ball
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: subhadeeproy3902
    name: paddle-ball
  name_template: "v{{ .Version }}"

brews:
  - name: paddle-ball
    tap:
      owner: subhadeeproy3902
      name: homebrew-paddle-ball
    folder: Formula
    homepage: "https://github.com/subhadeeproy3902/paddle-ball"
    description: "🏓 A physics-based neon terminal paddleball game with score history"
    license: MIT
    test: |
      system "#{bin}/paddle-ball version"
    install: |
      bin.install "paddle-ball"

nfpms:
  - id: packages
    package_name: paddle-ball
    vendor: Subhadeep Roy
    homepage: https://github.com/subhadeeproy3902/paddle-ball
    maintainer: "Subhadeep Roy <subhadeep3902@gmail.com>"
    description: |-
      A physics-based neon terminal paddleball game.
      Smooth delta-time physics, particle effects, power-ups,
      persistent score history, and four visual themes.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    section: games
    contents:
      - src: ./README.md
        dst: /usr/share/doc/paddle-ball/README.md

snapcrafts:
  - name: paddle-ball
    publish: false
    summary: "🏓 Neon terminal paddleball game"
    description: |
      Physics-based paddleball for the terminal. Delta-time ball movement,
      particle effects, power-ups, four visual themes, and persistent score
      history. Classic, Arcade, Zen, and Time Trial modes.
    grade: stable
    confinement: strict
    license: MIT
    apps:
      paddle-ball:
        plugs: ["home", "network"]

dockers:
  - image_templates:
      - "ghcr.io/subhadeeproy3902/paddle-ball:{{ .Tag }}"
      - "ghcr.io/subhadeeproy3902/paddle-ball:latest"
    dockerfile: Dockerfile
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=paddle-ball"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/subhadeeproy3902/paddle-ball"