version: 2

project_name: pong-ball

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: pong-ball
    main: .
    binary: pong-ball
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: subhadeeproy3902
    name: pong-ball
  name_template: "v{{ .Version }}"

brews:
  - name: pong-ball
    # Self-hosted tap: the formula lives in THIS repo's Formula/ folder. The
    # automatic GITHUB_TOKEN can write to the same repo, so no PAT or separate
    # tap repo is needed. Install: brew install <raw Formula URL>.
    repository:
      owner: subhadeeproy3902
      name: pong-ball
      branch: main
    directory: Formula
    skip_upload: false
    homepage: "https://pongball.mvp-subha.me"
    description: "A minimalist physics-based terminal Pong game with score history"
    license: MIT
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: homebrew formula for {{ .Tag }}"
    test: |
      system "#{bin}/pong-ball version"
    install: |
      bin.install "pong-ball"

nfpms:
  - id: packages
    package_name: pong-ball
    vendor: Subhadeep Roy
    homepage: https://github.com/subhadeeproy3902/pong-ball
    maintainer: "Subhadeep Roy <subhadeep3902@gmail.com>"
    description: |-
      A minimalist physics-based terminal Pong game.
      Sub-stepped collision physics, a spring-driven paddle, power-ups,
      persistent score history, and five restrained themes.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    section: games
    contents:
      - src: ./README.md
        dst: /usr/share/doc/pong-ball/README.md

# Scoop (Windows). The manifest lives in THIS repo's bucket/ folder. Install:
#   scoop install https://raw.githubusercontent.com/subhadeeproy3902/pong-ball/main/bucket/pong-ball.json
scoops:
  - name: pong-ball
    repository:
      owner: subhadeeproy3902
      name: pong-ball
      branch: main
    directory: bucket
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: scoop manifest for {{ .Tag }}"
    homepage: "https://pongball.mvp-subha.me"
    description: "A minimalist physics-based terminal Pong game with score history"
    license: MIT
    skip_upload: false

# WinGet (Windows). Manifests are committed to THIS repo's manifests/ folder.
# `winget install pong-ball` from the official catalog needs a reviewed PR to
# microsoft/winget-pkgs; from the folder here, use: winget install --manifest <dir>.
winget:
  - name: pong-ball
    publisher: subhadeeproy3902
    package_identifier: subhadeeproy3902.pong-ball
    license: MIT
    homepage: "https://pongball.mvp-subha.me"
    short_description: "A minimalist physics-based terminal Pong game"
    description: "Physics-based Pong for the terminal — sub-stepped collisions, a spring-driven paddle, five themes, four modes, and a persistent score history."
    repository:
      owner: subhadeeproy3902
      name: pong-ball
      branch: main
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: winget manifest for {{ .Tag }}"
    skip_upload: false

# Note: snap packaging was removed from the release pipeline — building a .snap
# requires the `snapcraft` toolchain, which isn't present on the GitHub runner
# and would fail the release. Re-add a `snapcrafts:` block with a snapcraft
# install step if you want snaps.

dockers:
  - image_templates:
      - "ghcr.io/subhadeeproy3902/pong-ball:{{ .Tag }}"
      - "ghcr.io/subhadeeproy3902/pong-ball:latest"
    dockerfile: Dockerfile
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=pong-ball"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/subhadeeproy3902/pong-ball"