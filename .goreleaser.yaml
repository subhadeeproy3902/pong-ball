version: 2

project_name: paddle-ball

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: paddle-ball
    main: .
    binary: paddle-ball
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: subhadeeproy3902
    name: paddle-ball
  name_template: "v{{ .Version }}"

brews:
  - name: paddle-ball
    repository:
      owner: subhadeeproy3902
      name: homebrew-paddle-ball
    directory: Formula
    # Generate the formula as a build artifact but don't push to the tap repo
    # unless HOMEBREW_TAP_GITHUB_TOKEN is configured — keeps tagged releases
    # green before the tap exists. Set to false once the tap + token are ready.
    skip_upload: true
    homepage: "https://github.com/subhadeeproy3902/paddle-ball"
    description: "A minimalist physics-based terminal paddleball game with score history"
    license: MIT
    test: |
      system "#{bin}/paddle-ball version"
    install: |
      bin.install "paddle-ball"

nfpms:
  - id: packages
    package_name: paddle-ball
    vendor: Subhadeep Roy
    homepage: https://github.com/subhadeeproy3902/paddle-ball
    maintainer: "Subhadeep Roy <subhadeep3902@gmail.com>"
    description: |-
      A minimalist physics-based terminal paddleball game.
      Sub-stepped collision physics, a spring-driven paddle, power-ups,
      persistent score history, and five restrained themes.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    section: games
    contents:
      - src: ./README.md
        dst: /usr/share/doc/paddle-ball/README.md

# Note: snap packaging was removed from the release pipeline — building a .snap
# requires the `snapcraft` toolchain, which isn't present on the GitHub runner
# and would fail the release. Re-add a `snapcrafts:` block with a snapcraft
# install step if you want snaps.

dockers:
  - image_templates:
      - "ghcr.io/subhadeeproy3902/paddle-ball:{{ .Tag }}"
      - "ghcr.io/subhadeeproy3902/paddle-ball:latest"
    dockerfile: Dockerfile
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=paddle-ball"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/subhadeeproy3902/paddle-ball"